name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'

jobs:
  lint-check-test:
    name: Lint, dependency check, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Clojure CLI
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-${{ hashFiles('apps/api/deps.edn') }}
          restore-keys: clj-

      - name: Lint with clj-kondo
        working-directory: apps/api
        run: clojure -M:clj-kondo --lint src

      - name: Dependency vulnerability check (nvd-clojure)
        working-directory: apps/api
        run: clojure -M:nvd
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: '7.0'

      - name: Run tests
        working-directory: apps/api
        run: clojure -M:test
        env:
          MONGODB_URI: mongodb://localhost:27017/tododb
          JWT_SECRET: ci-test-secret
