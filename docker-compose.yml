services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: tododb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/tododb
      JWT_SECRET: ${JWT_SECRET:-dev-secret-do-not-use-in-production}
      PORT: "3000"
    depends_on:
      mongodb:
        condition: service_healthy
    profiles: ["prod"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    profiles: ["prod"]

volumes:
  mongo_data:
